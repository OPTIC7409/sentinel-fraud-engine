version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: sentinel_fraud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network

  # Kafka + Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sentinel-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentinel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - sentinel-network

  # Transaction Ingest Service
  transaction-ingest:
    build:
      context: .
      dockerfile: services/transaction-ingest/Dockerfile
    container_name: sentinel-transaction-ingest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      ENV: production
    networks:
      - sentinel-network
    restart: unless-stopped

  # Risk Engine Service
  risk-engine:
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
    container_name: sentinel-risk-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sentinel_fraud?sslmode=disable
      MODEL_DIR: /app/ml/model
      ENV: production
    volumes:
      - ./ml/model:/app/ml/model:ro
    networks:
      - sentinel-network
    restart: unless-stopped

  # Alert Service
  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: sentinel-alert-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sentinel_fraud?sslmode=disable
      ENV: production
    networks:
      - sentinel-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: sentinel-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sentinel_fraud?sslmode=disable
      JWT_SECRET: change-this-in-production-use-env-var
      ENV: production
    networks:
      - sentinel-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sentinel-network:
    driver: bridge
